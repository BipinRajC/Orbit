services:
  backend:
    build: ./backend
    container_name: contentos-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - clips_data:/app/clips
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: contentos-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules   # anonymous volume — keeps container node_modules
      - /app/.next          # anonymous volume — keeps Next.js build cache
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  clips_data:  # persistent clip storage shared with backend
