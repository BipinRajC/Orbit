<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 790" role="img" aria-labelledby="title desc">
  <title id="title">OrbitOS architecture</title>
  <desc id="desc">OrbitOS v3-mvp architecture showing the seven-stage pipeline, review loop, and supporting runtime infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfaf2" />
      <stop offset="100%" stop-color="#f5ede0" />
    </linearGradient>
    <linearGradient id="ingest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe1a8" />
      <stop offset="100%" stop-color="#ffd58c" />
    </linearGradient>
    <linearGradient id="transcribe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc3cd" />
      <stop offset="100%" stop-color="#f7b8c7" />
    </linearGradient>
    <linearGradient id="recall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6c6f4" />
      <stop offset="100%" stop-color="#c7b7ed" />
    </linearGradient>
    <linearGradient id="extract" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4f0c9" />
      <stop offset="100%" stop-color="#c1e4be" />
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0e6fb" />
      <stop offset="100%" stop-color="#aed9f8" />
    </linearGradient>
    <linearGradient id="generate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd995" />
      <stop offset="100%" stop-color="#ffcf7d" />
    </linearGradient>
    <linearGradient id="review" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9d7a" />
      <stop offset="100%" stop-color="#ff855f" />
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1a1a1a" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="1680" height="790" fill="url(#bg)" />
  <circle cx="1540" cy="120" r="110" fill="#c8b8ef" opacity="0.14" />
