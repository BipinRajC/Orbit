  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#252525">
    <text x="88" y="170" font-size="15" font-weight="700" fill="#6d6d6d">01</text>
    <text x="88" y="202" font-size="18" font-weight="800">INGEST</text>
    <text x="88" y="307" font-size="14" font-weight="700" fill="#666666">YouTube URL</text>
    <text x="88" y="329" font-size="14" font-weight="700" fill="#666666">captions / audio fetch</text>

    <text x="288" y="170" font-size="15" font-weight="700" fill="#6d6d6d">02</text>
    <text x="288" y="202" font-size="18" font-weight="800">TRANSCRIBE</text>
    <text x="288" y="307" font-size="14" font-weight="700" fill="#666666">Groq Whisper</text>
    <text x="288" y="329" font-size="14" font-weight="700" fill="#666666">timestamped segments</text>

    <text x="488" y="170" font-size="15" font-weight="700" fill="#6d6d6d">03</text>
    <text x="488" y="202" font-size="18" font-weight="800">RECALL</text>
    <text x="488" y="307" font-size="14" font-weight="700" fill="#666666">Hindsight memory</text>
    <text x="488" y="329" font-size="14" font-weight="700" fill="#666666">recall() + reflect()</text>

    <text x="688" y="170" font-size="15" font-weight="700" fill="#6d6d6d">04</text>
    <text x="688" y="202" font-size="18" font-weight="800">EXTRACT</text>
    <text x="688" y="307" font-size="14" font-weight="700" fill="#666666">Claude Haiku 4.5</text>
    <text x="688" y="329" font-size="14" font-weight="700" fill="#666666">moment selection</text>

    <text x="888" y="170" font-size="15" font-weight="700" fill="#6d6d6d">05</text>
    <text x="888" y="202" font-size="18" font-weight="800">CLIP</text>
    <text x="888" y="307" font-size="14" font-weight="700" fill="#666666">yt-dlp + ffmpeg</text>
    <text x="888" y="329" font-size="14" font-weight="700" fill="#666666">9:16 vertical crop</text>

    <text x="1088" y="170" font-size="15" font-weight="700" fill="#6d6d6d">06</text>
    <text x="1088" y="202" font-size="18" font-weight="800">GENERATE</text>
    <text x="1088" y="307" font-size="14" font-weight="700" fill="#666666">Claude Sonnet 4.5</text>
    <text x="1088" y="329" font-size="14" font-weight="700" fill="#666666">production briefs</text>

    <text x="1288" y="170" font-size="15" font-weight="700" fill="#6d6d6d">07</text>
    <text x="1288" y="202" font-size="18" font-weight="800">REVIEW</text>
    <text x="1288" y="307" font-size="14" font-weight="700" fill="#666666">edit / approve / reject</text>
    <text x="1288" y="329" font-size="14" font-weight="700" fill="#666666">regenerate in studio</text>

    <text x="62" y="548" font-size="20" font-weight="800" fill="#ffffff">HINDSIGHT MEMORY BANK</text>
    <text x="62" y="588" font-size="14" font-weight="700" fill="#f5efff">retain() / recall() / reflect()</text>
    <text x="62" y="614" font-size="14" font-weight="700" fill="#f5efff">bank: orbit-os | budget: mid / low</text>
    <text x="62" y="640" font-size="14" font-weight="700" fill="#f5efff">tags: editing-behaviour, platform, tone</text>
    <rect x="82" y="664" width="286" height="48" rx="12" fill="#0c96c0" opacity="0.92" />
    <text x="225" y="696" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">creator memory surface</text>

    <text x="472" y="548" font-size="20" font-weight="800">CASCADEFLOW SURFACE</text>
    <text x="472" y="588" font-size="14" font-weight="700" fill="#5d4f35">review synthesis agent</text>
    <text x="472" y="614" font-size="14" font-weight="700" fill="#5d4f35">quality thresholds: 0.5 / 0.65 / 0.8</text>
    <text x="472" y="640" font-size="14" font-weight="700" fill="#5d4f35">cost telemetry + legacy routing fields</text>
    <text x="635" y="699" text-anchor="middle" font-size="26" font-weight="800" fill="#1f1f1f">memory synthesis + cost panel</text>

    <text x="882" y="548" font-size="20" font-weight="800">SUPABASE</text>
    <text x="882" y="588" font-size="14" font-weight="700" fill="#4d5a4d">projects / moments / derivatives</text>
    <text x="882" y="614" font-size="14" font-weight="700" fill="#4d5a4d">editing events / creator profiles</text>
    <text x="882" y="640" font-size="14" font-weight="700" fill="#4d5a4d">status polling + review persistence</text>
    <rect x="882" y="666" width="260" height="50" rx="12" fill="#ffffff" opacity="0.88" />
    <text x="1012" y="699" text-anchor="middle" font-size="22" font-weight="800" fill="#1f1f1f">operational state</text>

    <text x="1292" y="548" font-size="20" font-weight="800">MODEL LAYER</text>
    <text x="1292" y="588" font-size="14" font-weight="700" fill="#6d5458">Claude Haiku 4.5  extract moments</text>
    <text x="1292" y="614" font-size="14" font-weight="700" fill="#6d5458">Claude Sonnet 4.5 generate briefs</text>
    <text x="1292" y="640" font-size="14" font-weight="700" fill="#6d5458">Groq Whisper         transcription</text>
    <rect x="1310" y="666" width="118" height="52" rx="10" fill="#ea7b53" opacity="0.95" />
    <rect x="1460" y="666" width="108" height="52" rx="10" fill="#f45c1a" opacity="0.95" />
    <text x="1369" y="699" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Anthropic</text>
    <text x="1514" y="699" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Groq</text>
  </g>

