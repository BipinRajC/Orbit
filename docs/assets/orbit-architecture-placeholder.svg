  <text x="1588" y="58" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#98a0ad">v3-mvp runtime + memory feedback loop</text>

  <text x="18" y="118" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#a3a3a3">PROCESSING PIPELINE</text>
  <line x1="18" y1="488" x2="1602" y2="488" stroke="#d5cdc2" stroke-width="2" />
  <text x="18" y="462" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#a3a3a3">INFRASTRUCTURE</text>

