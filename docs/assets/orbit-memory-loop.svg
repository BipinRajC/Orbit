<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">OrbitOS memory loop</title>
  <desc id="desc">Diagram showing how OrbitOS collects creator profile data, uses Hindsight memory during generation, captures review events, and synthesizes new observations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcf8ef" />
      <stop offset="100%" stop-color="#f6eee1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1a1a1a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)" />
  <circle cx="1160" cy="136" r="110" fill="#9575cd" opacity="0.10" />
  <circle cx="200" cy="748" r="126" fill="#ff8a65" opacity="0.10" />

  <text x="88" y="112" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="800" fill="#1a1a1a">Memory is a product loop, not a sidecar</text>
  <text x="88" y="154" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#5f5954">OrbitOS writes creator memory before generation, during review, and after review completion.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="220" width="390" height="210" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    <rect x="920" y="220" width="390" height="210" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    <rect x="920" y="560" width="390" height="210" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    <rect x="90" y="560" width="390" height="210" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    <circle cx="700" cy="495" r="172" fill="#1a1a1a" />
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="130" y="276" font-size="27" font-weight="800" fill="#1a1a1a">1. Creator profile</text>
    <text x="130" y="316" font-size="19" fill="#5f5954">`POST /api/profile` writes creator</text>
    <text x="130" y="344" font-size="19" fill="#5f5954">observations into Hindsight before</text>
    <text x="130" y="372" font-size="19" fill="#5f5954">the first project is even processed.</text>
    <text x="130" y="404" font-size="17" font-weight="700" fill="#ff8a65">4 required observations</text>
    <text x="130" y="428" font-size="17" font-weight="700" fill="#ff8a65">up to 5 optional observations</text>

    <text x="960" y="276" font-size="27" font-weight="800" fill="#1a1a1a">2. Recall and reflect</text>
    <text x="960" y="316" font-size="19" fill="#5f5954">Before extraction and brief writing,</text>
    <text x="960" y="344" font-size="19" fill="#5f5954">OrbitOS pulls creator memory and</text>
    <text x="960" y="372" font-size="19" fill="#5f5954">injects it back into generation.</text>
    <text x="960" y="404" font-size="17" font-weight="700" fill="#9575cd">`recall_count` and `biases_applied`</text>
    <text x="960" y="428" font-size="17" font-weight="700" fill="#9575cd">are stored on each project.</text>

    <text x="960" y="616" font-size="27" font-weight="800" fill="#1a1a1a">3. Review signals</text>
    <text x="960" y="656" font-size="19" fill="#5f5954">Edits, approvals, rejects, and</text>
    <text x="960" y="684" font-size="19" fill="#5f5954">regenerations become `editing_events`</text>
    <text x="960" y="712" font-size="19" fill="#5f5954">rows in Supabase.</text>
    <text x="960" y="742" font-size="17" font-weight="700" fill="#4caf50">Raw supervision data for the next run</text>

    <text x="130" y="616" font-size="27" font-weight="800" fill="#1a1a1a">4. Synthesize and retain</text>
    <text x="130" y="656" font-size="19" fill="#5f5954">Completing review writes fresh creator</text>
    <text x="130" y="684" font-size="19" fill="#5f5954">observations back into Hindsight and</text>
    <text x="130" y="712" font-size="19" fill="#5f5954">upgrades future prompts automatically.</text>
    <text x="130" y="742" font-size="17" font-weight="700" fill="#ff8a65">6-10 observations per review cycle</text>

    <text x="700" y="432" text-anchor="middle" font-size="29" font-weight="800" fill="#faf7f0">The next project</text>
    <text x="700" y="468" text-anchor="middle" font-size="29" font-weight="800" fill="#faf7f0">starts smarter</text>
    <text x="700" y="516" text-anchor="middle" font-size="20" fill="#d7d1cb">Hindsight recall and reflect</text>
    <text x="700" y="544" text-anchor="middle" font-size="20" fill="#d7d1cb">shape moment extraction</text>
    <text x="700" y="572" text-anchor="middle" font-size="20" fill="#d7d1cb">and production briefs</text>
    <text x="700" y="606" text-anchor="middle" font-size="16" font-weight="700" fill="#ffd180">retain -> recall</text>
    <text x="700" y="628" text-anchor="middle" font-size="16" font-weight="700" fill="#ffd180">reflect -> generate</text>
  </g>

  <path d="M480 325 C590 248 804 248 920 325" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" />
  <polygon points="902,309 938,325 902,341" fill="#1a1a1a" />

  <path d="M1115 430 C1228 486 1228 520 1115 560" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" />
  <polygon points="1112,543 1086,573 1125,564" fill="#1a1a1a" />

  <path d="M920 655 C804 732 590 732 480 655" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" />
  <polygon points="497,639 462,655 497,671" fill="#1a1a1a" />

  <path d="M286 560 C172 520 172 486 286 430" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" />
  <polygon points="290,448 318,418 278,426" fill="#1a1a1a" />
</svg>