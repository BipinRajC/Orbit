<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">OrbitOS memory KPI chart</title>
  <desc id="desc">Chart showing where OrbitOS memory comes from and which measurable signals in the current codebase can be used to track improvement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcf8ef" />
      <stop offset="100%" stop-color="#f7efe3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1a1a1a" flood-opacity="0.10" />
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)" />
  <text x="80" y="94" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#1a1a1a">How OrbitOS can quantify personalization right now</text>
  <text x="80" y="132" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#5f5954">These counts come directly from the current routes, seed script, and memory synthesis logic in this branch.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="182" width="700" height="660" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    <rect x="812" y="182" width="518" height="660" rx="28" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
  </g>

  <text x="110" y="236" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#1a1a1a">Memory inventory before the next project</text>
  <text x="110" y="272" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5f5954">Each bar is a code-backed source of creator memory.</text>

  <g>
    <line x1="130" y1="760" x2="718" y2="760" stroke="#1a1a1a" stroke-width="3" />
    <line x1="130" y1="330" x2="130" y2="760" stroke="#1a1a1a" stroke-width="3" />

    <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5f5954">
      <text x="106" y="764" text-anchor="end">0</text>
      <text x="106" y="700" text-anchor="end">5</text>
      <text x="106" y="636" text-anchor="end">10</text>
      <text x="106" y="572" text-anchor="end">15</text>
      <text x="106" y="508" text-anchor="end">20</text>
      <text x="106" y="444" text-anchor="end">25</text>
      <text x="106" y="380" text-anchor="end">30</text>
    </g>

    <line x1="130" y1="696" x2="718" y2="696" stroke="#d9d1c7" stroke-width="1.5" />
    <line x1="130" y1="632" x2="718" y2="632" stroke="#d9d1c7" stroke-width="1.5" />
    <line x1="130" y1="568" x2="718" y2="568" stroke="#d9d1c7" stroke-width="1.5" />
    <line x1="130" y1="504" x2="718" y2="504" stroke="#d9d1c7" stroke-width="1.5" />
    <line x1="130" y1="440" x2="718" y2="440" stroke="#d9d1c7" stroke-width="1.5" />
    <line x1="130" y1="376" x2="718" y2="376" stroke="#d9d1c7" stroke-width="1.5" />

    <rect x="176" y="632" width="88" height="128" rx="18" fill="#ffd180" />
    <rect x="314" y="530" width="88" height="230" rx="18" fill="#ffab91" />
    <rect x="452" y="504" width="88" height="256" rx="18" fill="#b39ddb" />
    <rect x="590" y="388" width="88" height="372" rx="18" fill="#a5d6a7" />

    <text x="220" y="620" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">4-9</text>
    <text x="358" y="518" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">10</text>
    <text x="496" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">6-10</text>
    <text x="634" y="376" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">10-29</text>

    <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1a1a1a" font-weight="700">
      <text x="220" y="794" text-anchor="middle">Profile</text>
      <text x="220" y="818" text-anchor="middle" font-size="15" font-weight="400" fill="#5f5954">required + optional</text>
      <text x="358" y="794" text-anchor="middle">Demo seed</text>
      <text x="358" y="818" text-anchor="middle" font-size="15" font-weight="400" fill="#5f5954">`seed_demo.py`</text>
      <text x="496" y="794" text-anchor="middle">Review</text>
      <text x="496" y="818" text-anchor="middle" font-size="15" font-weight="400" fill="#5f5954">synthesis</text>
      <text x="634" y="794" text-anchor="middle">Next project</text>
      <text x="634" y="818" text-anchor="middle" font-size="15" font-weight="400" fill="#5f5954">available context</text>
    </g>
  </g>

  <text x="844" y="236" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#1a1a1a">Signals to track per project</text>
  <text x="844" y="268" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5f5954">All of these can be derived from fields and</text>
  <text x="844" y="292" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5f5954">tables already present in this branch.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="844" y="334" width="452" height="104" rx="22" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2" />
    <text x="874" y="374" font-size="23" font-weight="800" fill="#1a1a1a">`recall_count`</text>
    <text x="874" y="404" font-size="17" fill="#5f5954">How much creator memory was pulled into</text>
    <text x="874" y="428" font-size="17" fill="#5f5954">generation for a given project.</text>

    <rect x="844" y="458" width="452" height="112" rx="22" fill="#f3eefc" stroke="#1a1a1a" stroke-width="2" />
    <text x="874" y="498" font-size="23" font-weight="800" fill="#1a1a1a">`biases_applied`</text>
    <text x="874" y="528" font-size="17" fill="#5f5954">How many memory-based preferences actively</text>
    <text x="874" y="552" font-size="17" fill="#5f5954">shaped a project's generated output.</text>

    <rect x="844" y="590" width="452" height="104" rx="22" fill="#eef8ef" stroke="#1a1a1a" stroke-width="2" />
    <text x="874" y="630" font-size="23" font-weight="800" fill="#1a1a1a">`observations_saved`</text>
    <text x="874" y="660" font-size="17" fill="#5f5954">New learning written after the creator</text>
    <text x="874" y="684" font-size="17" fill="#5f5954">completes review for a project.</text>

    <rect x="844" y="714" width="452" height="118" rx="22" fill="#fff2ec" stroke="#1a1a1a" stroke-width="2" />
    <text x="874" y="754" font-size="23" font-weight="800" fill="#1a1a1a">`editing_events`</text>
    <text x="874" y="784" font-size="17" fill="#5f5954">Use these rows to compute approval rate,</text>
    <text x="874" y="808" font-size="17" fill="#5f5954">regeneration rate, and manual edit rate</text>
    <text x="874" y="832" font-size="17" fill="#5f5954">over time.</text>
  </g>
</svg>